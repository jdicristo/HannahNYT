<div class="app-wrapper">
  <header class="header">
    <div class="header-inner">
      <h1 class="title">Hannahdle</h1>
    </div>
    <div class="header-divider"></div>
  </header>

  <div class="toast-container" [class.visible]="message">
    <div class="toast">{{ message }}</div>
  </div>

  <main class="main">
    <app-board></app-board>
  </main>

  <footer class="footer">
    <ng-container *ngIf="!(gameState === GameState.Won && modalClosed); else nextCTA">
      <app-keyboard></app-keyboard>
    </ng-container>
    <ng-template #nextCTA>
      <button class="cta big" (click)="nextGame()">NEXT GAME</button>
    </ng-template>
  </footer>
</div>

<!-- Win modal -->
<div class="modal-backdrop" *ngIf="gameState === GameState.Won && !modalClosed">
  <div class="modal">
    <button class="close-button" aria-label="close" (click)="closeModal()">
      <img src="assets/close.svg" alt="Close" />
    </button>
    <h2 class="title">{{ currentGame.modalMessage }}</h2>
    <button class="cta" (click)="nextGame()">NEXT GAME</button>
  </div>
</div>
